<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>openpilot Supported Cars</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="bg-gray-50 h-full">

  <div x-data="carTable()" @keydown.escape.window="openFilter = null" class="p-6 h-full flex flex-col">

    <!-- Header -->
    <div class="mb-6 flex items-start justify-between">
      <div>
        <h1 class="text-3xl font-bold text-gray-900">openpilot Supported Cars</h1>
        <p class="mt-1 text-gray-500">
          <span x-text="filteredCars.length"></span> of <span x-text="cars.length"></span> cars
          &middot;
          <a href="https://github.com/W-Floyd/openpilot-support" target="_blank" rel="noopener"
            class="hover:underline">Github</a>
          &middot;
          <button @click="openAllEbayLinks()" class="hover:underline">Open all eBay links</button>
        </p>
      </div>
      <div class="flex items-center gap-1 rounded-lg border border-gray-200 bg-white p-1 shadow-sm">
        <button @click="speedUnit = 'km/h'"
          :class="speedUnit === 'km/h' ? 'bg-gray-800 text-white' : 'text-gray-500 hover:text-gray-800'"
          class="rounded px-3 py-1 text-sm font-medium transition-colors">km/h</button>
        <button @click="speedUnit = 'mph'"
          :class="speedUnit === 'mph' ? 'bg-gray-800 text-white' : 'text-gray-500 hover:text-gray-800'"
          class="rounded px-3 py-1 text-sm font-medium transition-colors">mph</button>
      </div>
    </div>

    <!-- Presets -->
    <div class="mb-3 flex flex-wrap items-center gap-2">
      <span class="text-xs font-medium text-gray-400 uppercase tracking-wide">Presets</span>
      <template x-for="preset in presets" :key="preset.label">
        <button @click="applyPreset(preset)"
          :class="isPresetActive(preset) ? 'bg-gray-800 text-white' : 'bg-white text-gray-600 hover:bg-gray-100 border border-gray-200'"
          class="rounded-full px-3 py-1 text-sm font-medium transition-colors shadow-sm" x-text="preset.label"></button>
      </template>
    </div>

    <!-- Active filter chips -->
    <div class="mb-4 flex flex-wrap gap-2" x-show="activeFilters.length > 0 || activeSpeedFilters.length > 0">
      <template x-for="f in activeFilters" :key="f.key + ':' + f.val">
        <span class="inline-flex items-center gap-1 rounded-full bg-blue-100 px-3 py-1 text-sm text-blue-800">
          <span x-text="columnLabel(f.key) + ': ' + f.val"></span>
          <button @click="removeFilter(f.key, f.val)"
            class="ml-1 font-bold leading-none hover:text-blue-600">&times;</button>
        </span>
      </template>
      <template x-for="f in activeSpeedFilters" :key="f.key">
        <span class="inline-flex items-center gap-1 rounded-full bg-blue-100 px-3 py-1 text-sm text-blue-800">
          <span x-text="f.label"></span>
          <button @click="clearFilter(f.key)" class="ml-1 font-bold leading-none hover:text-blue-600">&times;</button>
        </span>
      </template>
      <button @click="clearAllFilters()"
        class="rounded-full bg-gray-200 px-3 py-1 text-sm text-gray-600 hover:bg-gray-300">
        Clear all
      </button>
    </div>

    <!-- Table -->
    <div class="overflow-auto rounded-lg shadow flex-1 min-h-0">
      <table class="w-full text-sm text-left">

        <thead class="sticky top-0 z-10 bg-gray-800 text-white">
          <tr>
            <template x-for="col in columns" :key="col.key">
              <th class="px-2 py-2 font-semibold whitespace-nowrap select-none">
                <div class="flex items-center gap-1">

                  <!-- Sort button -->
                  <button @click="toggleSort(col.key)"
                    class="flex items-center gap-1 transition-colors hover:text-blue-300">
                    <span x-text="colLabel(col)"></span>
                    <span class="text-xs opacity-50" x-show="sortCol !== col.key">⇅</span>
                    <span class="text-xs text-blue-300" x-show="sortCol === col.key && sortDir === 'asc'">↑</span>
                    <span class="text-xs text-blue-300" x-show="sortCol === col.key && sortDir === 'desc'">↓</span>
                  </button>

                  <!-- Filter button + dropdown -->
                  <div class="relative" x-show="col.filterable">
                    <button
                      @click.stop="openFilter = openFilter === col.key ? (filterSearch[col.key] = '', null) : col.key"
                      class="rounded p-0.5 transition-colors hover:bg-gray-700"
                      :class="(filters[col.key] && filters[col.key].length > 0) || isSpeedFilterActive(col.key) ? 'text-blue-300' : 'text-gray-400'">
                      <svg class="h-3 w-3" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd"
                          d="M3 3a1 1 0 011-1h12a1 1 0 011 1v3a1 1 0 01-.293.707L12 11.414V15a1 1 0 01-.553.894l-4 2A1 1 0 016 17v-5.586L3.293 6.707A1 1 0 013 6V3z"
                          clip-rule="evenodd" />
                      </svg>
                    </button>

                    <div x-show="openFilter === col.key" @click.outside="openFilter = null"
                      x-transition:enter="transition ease-out duration-100"
                      x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100"
                      class="absolute left-0 top-full z-50 mt-1 min-w-48 rounded-lg border border-gray-200 bg-white shadow-xl">
                      <div class="flex items-center justify-between border-b border-gray-100 px-3 py-2">
                        <span class="text-xs font-semibold text-gray-700" x-text="colLabel(col)"></span>
                        <button @click="clearFilter(col.key)" class="text-xs text-gray-400 hover:text-gray-600">
                          Clear
                        </button>
                      </div>
                      <!-- Speed range slider -->
                      <template x-if="col.speed">
                        <div class="p-3 space-y-3 min-w-56">
                          <div>
                            <div class="mb-1 flex justify-between text-xs text-gray-500">
                              <span>Min</span>
                              <span
                                x-text="speedFilters[col.key].min !== null ? formatSpeed(speedFilters[col.key].min) : formatSpeed(speedRange(col.key).min)"></span>
                            </div>
                            <input type="range" :min="convertFromMs(speedRange(col.key).min)"
                              :max="convertFromMs(speedRange(col.key).max)" step="0.1"
                              :value="convertFromMs(speedFilters[col.key].min ?? speedRange(col.key).min)"
                              @input="speedFilters[col.key].min = convertToMs(parseFloat($event.target.value))"
                              @click.stop class="w-full accent-blue-600">
                          </div>
                          <div>
                            <div class="mb-1 flex justify-between text-xs text-gray-500">
                              <span>Max</span>
                              <span
                                x-text="speedFilters[col.key].max !== null ? formatSpeed(speedFilters[col.key].max) : formatSpeed(speedRange(col.key).max)"></span>
                            </div>
                            <input type="range" :min="convertFromMs(speedRange(col.key).min)"
                              :max="convertFromMs(speedRange(col.key).max)" step="0.1"
                              :value="convertFromMs(speedFilters[col.key].max ?? speedRange(col.key).max)"
                              @input="speedFilters[col.key].max = convertToMs(parseFloat($event.target.value))"
                              @click.stop class="w-full accent-blue-600">
                          </div>
                          <div class="border-t border-gray-100 pt-2">
                            <div class="mb-1 flex justify-between px-1 text-xs text-gray-400">
                              <span>Value</span>
                              <div class="flex gap-3">
                                <span>Min</span>
                                <span>Max</span>
                              </div>
                            </div>
                            <div class="max-h-40 overflow-y-auto space-y-0.5">
                              <template x-for="v in speedRange(col.key).values" :key="v">
                                <div class="flex items-center justify-between rounded px-1 py-0.5 text-xs"
                                  :class="speedFilters[col.key].min === v || speedFilters[col.key].max === v ? 'bg-blue-50 text-blue-800' : 'text-gray-600'">
                                  <span x-text="formatSpeed(v)"></span>
                                  <div class="flex gap-3">
                                    <button @click.stop="speedFilters[col.key].min = v"
                                      :class="speedFilters[col.key].min === v ? 'text-blue-600 font-bold' : 'text-gray-400 hover:text-blue-600'"
                                      class="w-6 text-center">↑</button>
                                    <button @click.stop="speedFilters[col.key].max = v"
                                      :class="speedFilters[col.key].max === v ? 'text-blue-600 font-bold' : 'text-gray-400 hover:text-blue-600'"
                                      class="w-6 text-center">↓</button>
                                  </div>
                                </div>
                              </template>
                            </div>
                          </div>
                        </div>
                      </template>

                      <!-- Checkbox filter -->
                      <template x-if="!col.speed">
                        <div>
                          <div class="border-b border-gray-100 px-2 py-1.5">
                            <input type="text" :placeholder="'Search ' + col.label.toLowerCase() + '…'"
                              x-model="filterSearch[col.key]" @click.stop
                              x-effect="if (openFilter === col.key) $nextTick(() => $el.focus())"
                              class="w-full rounded border border-gray-200 px-2 py-1 text-xs text-gray-700 placeholder-gray-400 focus:border-blue-400 focus:outline-none">
                          </div>
                          <div class="border-b border-gray-100 px-2 py-1">
                            <label
                              class="flex cursor-pointer items-center gap-2 rounded px-2 py-1.5 text-gray-500 hover:bg-gray-50">
                              <input type="checkbox" :checked="allVisibleSelected(col.key)"
                                :indeterminate.prop="someVisibleSelected(col.key) && !allVisibleSelected(col.key)"
                                @change="toggleSelectAll(col.key)" @click.stop
                                class="rounded border-gray-300 text-blue-600">
                              <span class="text-xs">Select all</span>
                            </label>
                          </div>
                          <div class="max-h-64 overflow-y-auto p-2">
                            <template x-for="val in filteredUniqueValues(col.key)" :key="val">
                              <label
                                class="flex cursor-pointer items-center gap-2 rounded px-2 py-1.5 text-gray-700 hover:bg-gray-50">
                                <input type="checkbox" :checked="isFilterActive(col.key, val)"
                                  @change="toggleFilter(col.key, val)" class="rounded border-gray-300 text-blue-600">
                                <span class="text-sm" x-text="val"></span>
                              </label>
                            </template>
                          </div>
                        </div>
                      </template>
                    </div>
                  </div>

                </div>
              </th>
            </template>
          </tr>
        </thead>

        <tbody class="divide-y divide-gray-100 bg-white">
          <template x-for="car in filteredCars" :key="car.name">
            <tr class="transition-colors hover:bg-gray-50">
              <template x-for="col in columns" :key="col.key">
                <td class="px-2 py-1.5 whitespace-nowrap">

                  <!-- support_type badge -->
                  <template x-if="col.key === 'support_type'">
                    <span class="rounded-full px-2 py-0.5 text-xs font-medium"
                      :class="supportTypeClass(car.support_type)" x-text="car.support_type"></span>
                  </template>

                  <!-- years array -->
                  <template x-if="col.key === 'years'">
                    <span x-text="formatYears(car.years)"></span>
                  </template>

                  <!-- boolean -->
                  <template
                    x-if="col.key !== 'support_type' && col.key !== 'years' && typeof car[col.key] === 'boolean'">
                    <span :class="car[col.key] ? 'text-green-600 font-medium' : 'text-red-500'"
                      x-text="car[col.key] ? '✓' : '✗'"></span>
                  </template>

                  <!-- null -->
                  <template x-if="col.key !== 'support_type' && col.key !== 'years' && car[col.key] === null">
                    <span class="text-gray-300">—</span>
                  </template>

                  <!-- speed (m/s converted to selected unit) -->
                  <template x-if="col.speed && car[col.key] !== null && typeof car[col.key] !== 'boolean'">
                    <span x-text="formatSpeed(car[col.key])"></span>
                  </template>

                  <!-- ebay link -->
                  <template x-if="col.ebay">
                    <a :href="ebayUrl(car)" target="_blank" rel="noopener"
                      class="text-blue-600 hover:underline text-xs">Search</a>
                  </template>

                  <!-- default string/number -->
                  <template
                    x-if="!col.speed && !col.ebay && col.key !== 'support_type' && col.key !== 'years' && car[col.key] !== null && typeof car[col.key] !== 'boolean'">
                    <span x-text="car[col.key]"></span>
                  </template>

                </td>
              </template>
            </tr>
          </template>

          <!-- Empty state -->
          <tr x-show="filteredCars.length === 0">
            <td :colspan="columns.length" class="px-2 py-12 text-center text-gray-400">
              No cars match the current filters.
            </td>
          </tr>
        </tbody>

      </table>
    </div>
  </div>

  <script type="application/json" id="cars-data">{{ cars_json }}</script>
  <script>
    function carTable() {
      const filterableCols = ['make', 'model', 'support_type', 'openpilot_longitudinal', 'merged', 'auto_resume', 'good_steering_torque', 'years', 'package'];

      return {
        cars: JSON.parse(document.getElementById('cars-data').textContent),
        sortCol: null,
        sortDir: 'asc',
        filters: Object.fromEntries(filterableCols.map(k => [k, []])),
        filterSearch: Object.fromEntries(filterableCols.map(k => [k, ''])),
        openFilter: null,
        speedUnit: 'mph',
        speedFilters: {
          min_steer_speed: { min: null, max: null },
          min_enable_speed: { min: null, max: null },
        },

        columns: [
          { key: 'make', label: 'Make' },
          { key: 'model', label: 'Model' },
          { key: 'years', label: 'Years' },
          { key: 'package', label: 'Package' },
          { key: 'support_type', label: 'Support Level' },
          { key: 'merged', label: 'Merged' },
          { key: 'openpilot_longitudinal', label: 'Longitudinal' },
          { key: 'auto_resume', label: 'Auto Resume' },
          { key: 'good_steering_torque', label: 'Good Torque' },
          { key: 'min_steer_speed', label: 'Min Steer', speed: true },
          { key: 'min_enable_speed', label: 'Min Enable', speed: true },
          { key: 'ebay', label: 'eBay', ebay: true },
        ].map(col => ({ ...col, filterable: filterableCols.includes(col.key) })),

        get filteredCars() {
          let result = this.cars.filter(car => {
            for (const [key, selected] of Object.entries(this.filters)) {
              if (selected.length === 0) continue;
              if (Array.isArray(car[key])) {
                if (!car[key].some(v => selected.includes(v))) return false;
              } else {
                if (!selected.some(s => String(s) === String(car[key]))) return false;
              }
            }
            for (const [key, range] of Object.entries(this.speedFilters)) {
              const val = car[key];
              if (val === null) {
                if (range.min !== null || range.max !== null) return false;
                continue;
              }
              if (range.min !== null && val < range.min) return false;
              if (range.max !== null && val > range.max) return false;
            }
            return true;
          });

          if (this.sortCol) {
            const dir = this.sortDir === 'asc' ? 1 : -1;
            result = [...result].sort((a, b) => {
              let av = a[this.sortCol], bv = b[this.sortCol];
              if (Array.isArray(av)) av = av[0] ?? null;
              if (Array.isArray(bv)) bv = bv[0] ?? null;
              if (av === null && bv === null) return 0;
              if (av === null) return dir;
              if (bv === null) return -dir;
              if (typeof av === 'string') return av.localeCompare(bv) * dir;
              return (av < bv ? -1 : av > bv ? 1 : 0) * dir;
            });
          }

          return result;
        },

        filteredCarsExcluding(excludeColKey) {
          return this.cars.filter(car => {
            for (const [key, selected] of Object.entries(this.filters)) {
              if (key === excludeColKey) continue;
              if (selected.length === 0) continue;
              if (Array.isArray(car[key])) {
                if (!car[key].some(v => selected.includes(v))) return false;
              } else {
                if (!selected.some(s => String(s) === String(car[key]))) return false;
              }
            }
            for (const [key, range] of Object.entries(this.speedFilters)) {
              if (key === excludeColKey) continue;
              const val = car[key];
              if (val === null) {
                if (range.min !== null || range.max !== null) return false;
                continue;
              }
              if (range.min !== null && val < range.min) return false;
              if (range.max !== null && val > range.max) return false;
            }
            return true;
          });
        },

        allUniqueValues(colKey) {
          const vals = this.cars.flatMap(c => Array.isArray(c[colKey]) ? c[colKey] : [c[colKey]]);
          return [...new Set(vals)].sort((a, b) => typeof a === 'number' ? a - b : String(a).localeCompare(String(b)));
        },

        uniqueValues(colKey) {
          const source = this.filteredCarsExcluding(colKey);
          const vals = source.flatMap(c => Array.isArray(c[colKey]) ? c[colKey] : [c[colKey]]);
          return [...new Set(vals)].sort((a, b) => typeof a === 'number' ? a - b : String(a).localeCompare(String(b)));
        },

        filteredUniqueValues(colKey) {
          const search = (this.filterSearch[colKey] ?? '').toLowerCase();
          const all = this.uniqueValues(colKey);
          return search ? all.filter(v => String(v).toLowerCase().includes(search)) : all;
        },

        toggleSort(colKey) {
          if (this.sortCol === colKey) {
            this.sortDir = this.sortDir === 'asc' ? 'desc' : 'asc';
          } else {
            this.sortCol = colKey;
            this.sortDir = 'asc';
          }
        },

        toggleFilter(colKey, val) {
          const idx = this.filters[colKey].indexOf(val);
          if (idx === -1) {
            this.filters[colKey].push(val);
          } else {
            this.filters[colKey].splice(idx, 1);
          }
        },

        isFilterActive(colKey, val) {
          return this.filters[colKey].includes(val);
        },

        allVisibleSelected(colKey) {
          const visible = this.filteredUniqueValues(colKey);
          return visible.length > 0 && visible.every(v => this.filters[colKey].includes(v));
        },

        someVisibleSelected(colKey) {
          return this.filteredUniqueValues(colKey).some(v => this.filters[colKey].includes(v));
        },

        toggleSelectAll(colKey) {
          const visible = this.filteredUniqueValues(colKey);
          if (this.allVisibleSelected(colKey)) {
            this.filters[colKey] = this.filters[colKey].filter(v => !visible.includes(v));
          } else {
            const toAdd = visible.filter(v => !this.filters[colKey].includes(v));
            this.filters[colKey].push(...toAdd);
          }
        },

        clearFilter(colKey) {
          if (this.speedFilters[colKey]) {
            this.speedFilters[colKey] = { min: null, max: null };
          } else {
            this.filters[colKey] = [];
            this.filterSearch[colKey] = '';
          }
        },

        clearAllFilters() {
          for (const key of Object.keys(this.filters)) {
            this.filters[key] = [];
          }
          for (const key of Object.keys(this.speedFilters)) {
            this.speedFilters[key] = { min: null, max: null };
          }
        },

        get activeFilters() {
          const result = [];
          for (const [key, selected] of Object.entries(this.filters)) {
            for (const val of selected) {
              result.push({ key, val });
            }
          }
          return result;
        },

        get activeSpeedFilters() {
          const result = [];
          for (const [key, range] of Object.entries(this.speedFilters)) {
            if (!this.isSpeedFilterActive(key)) continue;
            const col = this.columns.find(c => c.key === key);
            const dataRange = this.speedRange(key);
            const parts = [];
            if (range.min !== null && range.min > dataRange.min) parts.push(`≥ ${this.formatSpeed(range.min)}`);
            if (range.max !== null && range.max < dataRange.max) parts.push(`≤ ${this.formatSpeed(range.max)}`);
            result.push({ key, label: `${col?.label ?? key}: ${parts.join(', ')}` });
          }
          return result;
        },

        removeFilter(key, val) {
          const idx = this.filters[key].indexOf(val);
          if (idx !== -1) this.filters[key].splice(idx, 1);
        },

        presets: [
          {
            label: 'All features',
            filters: {
              auto_resume: [true],
              good_steering_torque: [true],
              openpilot_longitudinal: ["!Stock"],
              support_type: ["!Not compatible", "!Dashcam mode"],
              package: ["^All"]
            },
            speedFilters: {
              min_steer_speed: { min: null, max: 'dataMin' },
              min_enable_speed: { min: null, max: 'dataMin' },
            },
          },
        ],

        resolveSpeedFilter(key, range) {
          return {
            min: range.min === 'dataMin' ? this.speedRange(key).min : range.min,
            max: range.max === 'dataMin' ? this.speedRange(key).min : range.max,
          };
        },

        applyPreset(preset) {
          if (this.isPresetActive(preset)) {
            this.clearAllFilters();
          } else {
            this.clearAllFilters();
            for (const [key, vals] of Object.entries(preset.filters)) {
              const excluded = vals.filter(v => String(v).startsWith('!')).map(v => String(v).slice(1));
              const prefixed = vals.filter(v => String(v).startsWith('^')).map(v => String(v).slice(1));
              if (excluded.length > 0) {
                this.filters[key] = this.allUniqueValues(key).filter(v => !excluded.includes(String(v)));
              } else if (prefixed.length > 0) {
                this.filters[key] = this.allUniqueValues(key).filter(v => prefixed.some(p => String(v).startsWith(p)));
              } else {
                this.filters[key] = [...vals];
              }
            }
            if (preset.speedFilters) {
              for (const [key, range] of Object.entries(preset.speedFilters)) {
                this.speedFilters[key] = this.resolveSpeedFilter(key, range);
              }
            }
          }
        },

        isPresetActive(preset) {
          const filtersMatch = Object.entries(preset.filters).every(([key, vals]) => {
            const excluded = vals.filter(v => String(v).startsWith('!')).map(v => String(v).slice(1));
            const prefixed = vals.filter(v => String(v).startsWith('^')).map(v => String(v).slice(1));
            if (excluded.length > 0) {
              const expected = this.allUniqueValues(key).filter(v => !excluded.includes(String(v)));
              return expected.length === this.filters[key]?.length &&
                expected.every(v => this.filters[key].includes(v));
            }
            if (prefixed.length > 0) {
              const expected = this.allUniqueValues(key).filter(v => prefixed.some(p => String(v).startsWith(p)));
              return expected.length === this.filters[key]?.length &&
                expected.every(v => this.filters[key].includes(v));
            }
            return vals.length === this.filters[key]?.length &&
              vals.every(v => this.filters[key].includes(v));
          });
          if (!filtersMatch) return false;
          if (!preset.speedFilters) return true;
          return Object.entries(preset.speedFilters).every(([key, range]) => {
            const resolved = this.resolveSpeedFilter(key, range);
            return this.speedFilters[key]?.min === resolved.min &&
              this.speedFilters[key]?.max === resolved.max;
          });
        },

        columnLabel(key) {
          return this.columns.find(c => c.key === key)?.label ?? key;
        },

        colLabel(col) {
          return col.label;
        },

        convertFromMs(mps) {
          return this.speedUnit === 'km/h' ? mps * 3.6 : mps * 2.23694;
        },

        convertToMs(val) {
          return this.speedUnit === 'km/h' ? val / 3.6 : val / 2.23694;
        },

        speedRange(colKey) {
          const vals = [...new Set(this.cars.map(c => c[colKey]).filter(v => v !== null))].sort((a, b) => a - b);
          return { min: vals[0] ?? 0, max: vals[vals.length - 1] ?? 0, values: vals };
        },

        isSpeedFilterActive(colKey) {
          const f = this.speedFilters[colKey];
          if (!f) return false;
          const range = this.speedRange(colKey);
          return (f.min !== null && f.min > range.min) || (f.max !== null && f.max < range.max);
        },

        formatSpeed(mps) {
          if (mps === null || mps === undefined) return '—';
          const converted = this.convertFromMs(mps);
          return `${converted.toFixed(1)} ${this.speedUnit}`;
        },

        formatYears(years) {
          if (!years || years.length === 0) return '—';
          const fmt = (start, end) => start === end ? String(start) : `${start}–${String(end).slice(-2)}`;
          const ranges = [];
          let start = years[0], end = years[0];
          for (let i = 1; i < years.length; i++) {
            if (years[i] === end + 1) {
              end = years[i];
            } else {
              ranges.push(fmt(start, end));
              start = end = years[i];
            }
          }
          ranges.push(fmt(start, end));
          return ranges.join(', ');
        },

        openAllEbayLinks() {
          const cars = this.filteredCars;
          if (cars.length > 10 && !confirm(`Open ${cars.length} eBay links?`)) return;
          for (const car of cars) {
            window.open(this.ebayUrl(car), '_blank', 'noopener');
          }
        },

        ebayUrl(car) {
          const years = [...new Set(car.years)].sort((a, b) => a - b).join(',');
          const query = encodeURIComponent(`${car.make} ${car.model.trim()} (${years})`);
          return `https://www.ebay.com/sch/6001/i.html?_nkw=${query}&_sop=2`;
        },

        supportTypeClass(supportType) {
          return {
            'Upstream': 'bg-green-100 text-green-800',
            'Under review': 'bg-yellow-100 text-yellow-800',
            'Community': 'bg-blue-100 text-blue-800',
            'Custom': 'bg-purple-100 text-purple-800',
            'Dashcam mode': 'bg-orange-100 text-orange-800',
            'Not compatible': 'bg-red-100 text-red-800',
          }[supportType] ?? 'bg-gray-100 text-gray-800';
        },
      };
    }
  </script>
