<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>openpilot Supported Cars</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">

<div x-data="carTable()" @keydown.escape.window="openFilter = null" class="p-6">

  <!-- Header -->
  <div class="mb-6">
    <h1 class="text-3xl font-bold text-gray-900">openpilot Supported Cars</h1>
    <p class="mt-1 text-gray-500">
      <span x-text="filteredCars.length"></span> of <span x-text="cars.length"></span> cars
    </p>
  </div>

  <!-- Active filter chips -->
  <div class="mb-4 flex flex-wrap gap-2" x-show="activeFilters.length > 0">
    <template x-for="f in activeFilters" :key="f.key + ':' + f.val">
      <span class="inline-flex items-center gap-1 rounded-full bg-blue-100 px-3 py-1 text-sm text-blue-800">
        <span x-text="columnLabel(f.key) + ': ' + f.val"></span>
        <button @click="removeFilter(f.key, f.val)" class="ml-1 font-bold leading-none hover:text-blue-600">&times;</button>
      </span>
    </template>
    <button
      @click="clearAllFilters()"
      class="rounded-full bg-gray-200 px-3 py-1 text-sm text-gray-600 hover:bg-gray-300"
    >
      Clear all
    </button>
  </div>

  <!-- Table -->
  <div class="overflow-x-auto rounded-lg shadow">
    <table class="w-full text-sm text-left">

      <thead class="sticky top-0 z-10 bg-gray-800 text-white">
        <tr>
          <template x-for="col in columns" :key="col.key">
            <th class="px-4 py-3 font-semibold whitespace-nowrap select-none">
              <div class="flex items-center gap-1">

                <!-- Sort button -->
                <button
                  @click="toggleSort(col.key)"
                  class="flex items-center gap-1 transition-colors hover:text-blue-300"
                >
                  <span x-text="col.label"></span>
                  <span class="text-xs opacity-50" x-show="sortCol !== col.key">⇅</span>
                  <span class="text-xs text-blue-300" x-show="sortCol === col.key && sortDir === 'asc'">↑</span>
                  <span class="text-xs text-blue-300" x-show="sortCol === col.key && sortDir === 'desc'">↓</span>
                </button>

                <!-- Filter button + dropdown -->
                <div class="relative" x-show="col.filterable">
                  <button
                    @click.stop="openFilter = openFilter === col.key ? null : col.key"
                    class="rounded p-1 transition-colors hover:bg-gray-700"
                    :class="filters[col.key] && filters[col.key].length > 0 ? 'text-blue-300' : 'text-gray-400'"
                  >
                    <svg class="h-3 w-3" fill="currentColor" viewBox="0 0 20 20">
                      <path fill-rule="evenodd" d="M3 3a1 1 0 011-1h12a1 1 0 011 1v3a1 1 0 01-.293.707L12 11.414V15a1 1 0 01-.553.894l-4 2A1 1 0 016 17v-5.586L3.293 6.707A1 1 0 013 6V3z" clip-rule="evenodd"/>
                    </svg>
                  </button>

                  <div
                    x-show="openFilter === col.key"
                    @click.outside="openFilter = null"
                    x-transition:enter="transition ease-out duration-100"
                    x-transition:enter-start="opacity-0 scale-95"
                    x-transition:enter-end="opacity-100 scale-100"
                    class="absolute left-0 top-full z-50 mt-1 min-w-48 rounded-lg border border-gray-200 bg-white shadow-xl"
                  >
                    <div class="flex items-center justify-between border-b border-gray-100 px-3 py-2">
                      <span class="text-xs font-semibold text-gray-700" x-text="col.label"></span>
                      <button
                        @click="clearFilter(col.key)"
                        class="text-xs text-gray-400 hover:text-gray-600"
                      >
                        Clear
                      </button>
                    </div>
                    <div class="max-h-64 overflow-y-auto p-2">
                      <template x-for="val in uniqueValues(col.key)" :key="val">
                        <label class="flex cursor-pointer items-center gap-2 rounded px-2 py-1.5 text-gray-700 hover:bg-gray-50">
                          <input
                            type="checkbox"
                            :checked="isFilterActive(col.key, val)"
                            @change="toggleFilter(col.key, val)"
                            class="rounded border-gray-300 text-blue-600"
                          >
                          <span class="text-sm" x-text="val"></span>
                        </label>
                      </template>
                    </div>
                  </div>
                </div>

              </div>
            </th>
          </template>
        </tr>
      </thead>

      <tbody class="divide-y divide-gray-100 bg-white">
        <template x-for="car in filteredCars" :key="car.name">
          <tr class="transition-colors hover:bg-gray-50">
            <template x-for="col in columns" :key="col.key">
              <td class="px-4 py-3 whitespace-nowrap">

                <!-- support_type badge -->
                <template x-if="col.key === 'support_type'">
                  <span
                    class="rounded-full px-2 py-0.5 text-xs font-medium"
                    :class="supportTypeClass(car.support_type)"
                    x-text="car.support_type"
                  ></span>
                </template>

                <!-- years array -->
                <template x-if="col.key === 'years'">
                  <span x-text="formatYears(car.years)"></span>
                </template>

                <!-- boolean -->
                <template x-if="col.key !== 'support_type' && col.key !== 'years' && typeof car[col.key] === 'boolean'">
                  <span
                    :class="car[col.key] ? 'text-green-600 font-medium' : 'text-red-500'"
                    x-text="car[col.key] ? '✓' : '✗'"
                  ></span>
                </template>

                <!-- null -->
                <template x-if="col.key !== 'support_type' && col.key !== 'years' && car[col.key] === null">
                  <span class="text-gray-300">—</span>
                </template>

                <!-- default string/number -->
                <template x-if="col.key !== 'support_type' && col.key !== 'years' && car[col.key] !== null && typeof car[col.key] !== 'boolean'">
                  <span x-text="car[col.key]"></span>
                </template>

              </td>
            </template>
          </tr>
        </template>

        <!-- Empty state -->
        <tr x-show="filteredCars.length === 0">
          <td :colspan="columns.length" class="px-4 py-12 text-center text-gray-400">
            No cars match the current filters.
          </td>
        </tr>
      </tbody>

    </table>
  </div>
</div>

<script type="application/json" id="cars-data">{{ cars_json }}</script>
<script>
function carTable() {
  const filterableCols = ['make', 'model', 'support_type', 'openpilot_longitudinal', 'merged', 'auto_resume', 'good_steering_torque', 'years'];

  return {
    cars: JSON.parse(document.getElementById('cars-data').textContent),
    sortCol: null,
    sortDir: 'asc',
    filters: Object.fromEntries(filterableCols.map(k => [k, []])),
    openFilter: null,

    columns: [
      { key: 'make',                   label: 'Make',            filterable: true  },
      { key: 'model',                  label: 'Model',           filterable: true  },
      { key: 'years',                  label: 'Years',           filterable: true  },
      { key: 'package',                label: 'Package',         filterable: false },
      { key: 'support_type',           label: 'Support Level',   filterable: true  },
      { key: 'merged',                 label: 'Merged',          filterable: true  },
      { key: 'openpilot_longitudinal', label: 'Longitudinal',    filterable: true  },
      { key: 'auto_resume',            label: 'Auto Resume',     filterable: true  },
      { key: 'good_steering_torque',   label: 'Good Torque',     filterable: true  },
      { key: 'min_steer_speed_mph',    label: 'Min Steer (mph)', filterable: false },
      { key: 'min_enable_speed_mph',   label: 'Min Enable (mph)', filterable: false },
    ],

    get filteredCars() {
      let result = this.cars.filter(car => {
        for (const [key, selected] of Object.entries(this.filters)) {
          if (selected.length === 0) continue;
          if (Array.isArray(car[key])) {
            if (!car[key].some(v => selected.includes(v))) return false;
          } else {
            if (!selected.includes(String(car[key]))) return false;
          }
        }
        return true;
      });

      if (this.sortCol) {
        const dir = this.sortDir === 'asc' ? 1 : -1;
        result = [...result].sort((a, b) => {
          let av = a[this.sortCol], bv = b[this.sortCol];
          if (Array.isArray(av)) av = av[0] ?? null;
          if (Array.isArray(bv)) bv = bv[0] ?? null;
          if (av === null && bv === null) return 0;
          if (av === null) return dir;
          if (bv === null) return -dir;
          if (typeof av === 'string') return av.localeCompare(bv) * dir;
          return (av < bv ? -1 : av > bv ? 1 : 0) * dir;
        });
      }

      return result;
    },

    uniqueValues(colKey) {
      const vals = this.cars.flatMap(c => Array.isArray(c[colKey]) ? c[colKey] : [c[colKey]]);
      return [...new Set(vals)].sort((a, b) => typeof a === 'number' ? a - b : String(a).localeCompare(String(b)));
    },

    toggleSort(colKey) {
      if (this.sortCol === colKey) {
        this.sortDir = this.sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        this.sortCol = colKey;
        this.sortDir = 'asc';
      }
    },

    toggleFilter(colKey, val) {
      const idx = this.filters[colKey].indexOf(val);
      if (idx === -1) {
        this.filters[colKey].push(val);
      } else {
        this.filters[colKey].splice(idx, 1);
      }
    },

    isFilterActive(colKey, val) {
      return this.filters[colKey].includes(val);
    },

    clearFilter(colKey) {
      this.filters[colKey] = [];
    },

    clearAllFilters() {
      for (const key of Object.keys(this.filters)) {
        this.filters[key] = [];
      }
    },

    get activeFilters() {
      const result = [];
      for (const [key, selected] of Object.entries(this.filters)) {
        for (const val of selected) {
          result.push({ key, val });
        }
      }
      return result;
    },

    removeFilter(key, val) {
      const idx = this.filters[key].indexOf(val);
      if (idx !== -1) this.filters[key].splice(idx, 1);
    },

    columnLabel(key) {
      return this.columns.find(c => c.key === key)?.label ?? key;
    },

    formatYears(years) {
      if (!years || years.length === 0) return '—';
      const ranges = [];
      let start = years[0], end = years[0];
      for (let i = 1; i < years.length; i++) {
        if (years[i] === end + 1) {
          end = years[i];
        } else {
          ranges.push(start === end ? String(start) : `${start}–${end}`);
          start = end = years[i];
        }
      }
      ranges.push(start === end ? String(start) : `${start}–${end}`);
      return ranges.join(', ');
    },

    supportTypeClass(supportType) {
      return {
        'Upstream':       'bg-green-100 text-green-800',
        'Under review':   'bg-yellow-100 text-yellow-800',
        'Community':      'bg-blue-100 text-blue-800',
        'Custom':         'bg-purple-100 text-purple-800',
        'Dashcam mode':   'bg-orange-100 text-orange-800',
        'Not compatible': 'bg-red-100 text-red-800',
      }[supportType] ?? 'bg-gray-100 text-gray-800';
    },
  };
}
</script>
</body>
</html>
