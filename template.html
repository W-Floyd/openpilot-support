                    },
                    colLabel(col) {
                        return this.isMobile && col.mobileLabel
                            ? col.mobileLabel
                            : col.label;
                    },
                    convertFromMs(mps) {
                        return this.speedUnit === "km/h"
                            ? mps * 3.6
                            : mps * 2.23694;
                    },
                    convertToMs(val) {
                        return this.speedUnit === "km/h"
                            ? val / 3.6
                            : val / 2.23694;
                    },

                    speedRange(colKey) {
                        return (
                            this._speedRangeCache[colKey] ??
                            this._computeSpeedRange(colKey)
                        );
                    },

                    _computeSpeedRange(colKey) {
                        const vals = [
                            ...new Set(
                                this.cars
                                    .map((c) => c[colKey])
                                    .filter((v) => v !== null),
                            ),
                        ].sort((a, b) => a - b);
                        return {
                            min: vals[0] ?? 0,
                            max: vals[vals.length - 1] ?? 0,
                            values: vals,
                        };
                    },

                    isAriFilterActive() {
                        return (
                            this.ariFilter.min !== null ||
                            this.ariFilter.max !== null
                        );
                    },

                    isSpeedFilterActive(colKey) {
                        const f = this.speedFilters[colKey];
                        if (!f) return false;
                        const range = this.speedRange(colKey);
                        return (
                            (f.min !== null && f.min > range.min) ||
                            (f.max !== null && f.max < range.max)
                        );
                    },

                    formatSpeed(mps) {
                        if (mps === null || mps === undefined) return "—";
                        return `${this.convertFromMs(mps).toFixed(1)} ${this.speedUnit}`;
                    },

                    formatYears(years) {
                        if (!years || years.length === 0) return "—";
                        const fmt = (start, end) =>
                            start === end
                                ? String(start)
                                : `${start}–${String(end).slice(-2)}`;
                        const ranges = [];
                        let start = years[0],
                            end = years[0];
                        for (let i = 1; i < years.length; i++) {
                            if (years[i] === end + 1) {
                                end = years[i];
                            } else {
                                ranges.push(fmt(start, end));
                                start = end = years[i];
                            }
                        }
                        ranges.push(fmt(start, end));
                        return ranges.join(", ");
                    },

                    toAscii(str) {
                        return str
                            .normalize("NFKD")
                            .replace(/[\u0300-\u036f]/g, "")
                            .replace(/[^\x00-\x7F]/g, "");
                    },

                    ccLookup(car, year) {
                        const mapped = this.modelMappings[
                            `${car.make}|${car.model}`
                        ] ?? [car.model];
                        for (const rm of mapped) {
                            const key = `${this.toAscii(car.make)}|${this.toAscii(rm)}|${year}`;
                            if (this.ccCache[key]) return this.ccCache[key];
                        }
                        return null;
                    },

                    ccYearRows(car) {
                        const years = [...new Set(car.years)].sort(
                            (a, b) => a - b,
                        );
                        const rows = [];
                        for (const y of years) {
                            const mapped = this.modelMappings[
                                `${car.make}|${car.model}`
                            ] ?? [car.model];
                            for (const rm of mapped) {
                                const d =
                                    this.ccCache[
                                        `${this.toAscii(car.make)}|${this.toAscii(rm)}|${y}`
                                    ];
                                if (d)
                                    rows.push({
                                        key: `${y}|${rm}`,
                                        year: y,
                                        rawModel: rm !== car.model ? rm : null,
                                        complaints: d.complaints ?? 0,
                                        recalls: d.recalls ?? 0,
                                        tsbs: d.tsbs ?? 0,
                                        seal: d.seal,
                                    });
                            }
                        }
                        return rows;
                    },

                    ccSealUrl(car, seal) {
                        const years = [...new Set(car.years)].sort(
                            (a, b) => a - b,
                        );
                        for (const y of years) {
                            const d = this.ccLookup(car, y);
                            if (!d) continue;
                            if (seal ? d.seal === seal : true) return d.url;
                        }
                        return null;
                    },

                    ccSealShort(seal) {
                        return (
                            {
                                "Seal of Awesome": "Best",
                                "Seal of Pretty Good": "Good",
                                "Beware of the Clunker": "Bad",
                                "Avoid Like The Plague": "Worst",
                            }[seal] ?? seal
                        );
                    },

                    ccSealClass(seal) {
                        return (
                            {
                                "Seal of Awesome": "seal-best",
                                "Seal of Pretty Good": "seal-good",
                                "Beware of the Clunker": "seal-bad",
                                "Avoid Like The Plague": "seal-worst",
                            }[seal] ?? "seal-none"
                        );
                    },

                    carGurusKey(car) {
                        const years = [...new Set(car.years)].sort(
                            (a, b) => a - b,
                        );
                        return `${this.toAscii(car.make)}|${this.toAscii(car.model)}|${years[0]}-${years[years.length - 1]}`;
                    },

                    urlYears(car) {
                        const selected = this.filters.years;
                        const years = [...new Set(car.years)].sort((a, b) => a - b);
                        if (!selected.length) return years;
                        const selectedSet = new Set(selected.map(Number));
                        return years.filter((y) => selectedSet.has(y));
                    },

                    ariKey(make, model, year) {
                        return `${this.toAscii(make)}|${this.toAscii(model)}|${year}`;
                    },

                    ariScore(car) {
                        const years = [...new Set(car.years)];
                        const scores = years
                            .map(
                                (y) =>
                                    this.ariCache[
                                        this.ariKey(car.make, car.model, y)
                                    ]?.score,
                            )
                            .filter((s) => s != null);
                        if (scores.length === 0) return null;
                        return {
                            min: Math.min(...scores),
                            max: Math.max(...scores),
                        };
                    },

                    ariLink(car) {
                        const years = [...new Set(car.years)].sort(
                            (a, b) => a - b,
                        );
                        const year =
                            [...years]
                                .reverse()
                                .find(
                                    (y) =>
                                        this.ariCache[
                                            this.ariKey(car.make, car.model, y)
                                        ]?.score != null,
                                ) ?? years[years.length - 1];
                        return (
                            this.ariCache[
                                this.ariKey(car.make, car.model, year)
                            ]?.url ??
                            `https://autoreliabilityindex.com/${this.toAscii(car.make).toLowerCase().replace(/ /g, "-")}/${this.toAscii(car.model).toLowerCase().replace(/ /g, "-")}/${year}`
                        );
                    },

                    ariColor(score) {
                        return `hsl(${score * 1.2}, 70%, 38%)`;
                    },

                    ariYearRows(car) {
                        const years = [...new Set(car.years)].sort(
                            (a, b) => a - b,
                        );
                        return years
                            .map((y) => {
                                const d =
                                    this.ariCache[
                                        this.ariKey(car.make, car.model, y)
                                    ];
                                if (d?.score == null) return null;
                                const url =
                                    d.url ??
                                    `https://autoreliabilityindex.com/${this.toAscii(car.make).toLowerCase().replace(/ /g, "-")}/${this.toAscii(car.model).toLowerCase().replace(/ /g, "-")}/${y}`;
                                return { year: y, score: d.score, url };
                            })
                            .filter(Boolean);
                    },

                    setSpeedUnit(unit) {
                        this.speedUnit = unit;
                        localStorage.setItem("speedUnit", unit);
                    },

                    reorderColumn(fromKey, toKey) {
                        if (fromKey === toKey) return;
                        const cols = [...this.allColumns];
                        const from = cols.findIndex((c) => c.key === fromKey);
                        const to = cols.findIndex((c) => c.key === toKey);
                        cols.splice(to, 0, cols.splice(from, 1)[0]);
                        this.allColumns = cols;
                        localStorage.setItem("columnOrder", JSON.stringify(cols.map((c) => c.key)));
                    },

                    toggleColumn(key) {
                        const idx = this.hiddenColumns.indexOf(key);
                        if (idx === -1) this.hiddenColumns.push(key);
                        else this.hiddenColumns.splice(idx, 1);
                        localStorage.setItem(
                            "hiddenColumns",
                            JSON.stringify(this.hiddenColumns),
                        );
                    },

                    toggleProvider(key) {
                        const idx = this.hiddenProviders.indexOf(key);
                        if (idx === -1) this.hiddenProviders.push(key);
                        else this.hiddenProviders.splice(idx, 1);
                        localStorage.setItem(
                            "hiddenProviders",
                            JSON.stringify(this.hiddenProviders),
                        );
                    },

                    resetSettings() {
                        localStorage.removeItem("hiddenColumns");
                        localStorage.removeItem("hiddenProviders");
                        localStorage.removeItem("speedUnit");
                        localStorage.removeItem("columnOrder");
                        localStorage.removeItem("sortCol");
                        localStorage.removeItem("sortDir");
                        this.sortCol = null;
                        this.sortDir = "asc";
                        this.clearAllFilters();
                        this.allColumns = [...this._defaultColumnOrder].map(k => this.allColumns.find(c => c.key === k)).filter(Boolean);
                        this.speedUnit = "mph";
                        this.hiddenProviders = [];
                        this.hiddenColumns = this.isMobile
                            ? [
                                  "support_type",
                                  "merged",
                                  "openpilot_longitudinal",
                                  "auto_resume",
                                  "good_steering_torque",
                                  "min_steer_speed",
                                  "min_enable_speed",
                                  "ari",
                                  "cc_seal",
                                  "ebay",
                                  "cargurus",
                              ]
                            : [];
                    },

                    init() {
                        for (const car of this.cars) {
                            car._carGurusKey = this.carGurusKey(car);
                            car._ariScore = this.ariScore(car);
                            car._ariLink = this.ariLink(car);
                            car._ccYearRows = this.ccYearRows(car);
                            car._ariYearRows = this.ariYearRows(car);

                            if (car._ariScore !== null) {
                                car._ariColorMin = this.ariColor(
                                    car._ariScore.min,
                                );
                                car._ariColorMax = this.ariColor(
                                    car._ariScore.max,
                                );
                            }
                            for (const row of car._ariYearRows)
                                row.color = this.ariColor(row.score);

                            car._ccUrl = this.ccSealUrl(car, "");
                            if (car.cc_seal) {
                                for (const s of car.cc_seal) {
                                    s.url = this.ccSealUrl(car, s.seal);
                                    s.cssClass = this.ccSealClass(s.seal);
                                    s.short = this.ccSealShort(s.seal);
                                }
                            }
                            for (const row of car._ccYearRows) {
                                row.sealClass = this.ccSealClass(row.seal);
                                row.sealShort = this.ccSealShort(row.seal);
                            }

                            car._yearsFormatted = this.formatYears(car.years);
                            car._modelHtml = car.model.replace(
                                /(\s*\([^)]*\))/g,
                                '<span class="mp">$1</span>',
                            );
                        }

                        const rawIdx = JSON.parse(
                            document.getElementById("filter-index").textContent,
                        );
                        for (const [key, vals] of Object.entries(rawIdx)) {
                            const built = {};
                            for (const [val, indices] of Object.entries(vals)) {
                                built[val] = new Set(
                                    indices.map((i) => this.cars[i]),
                                );
                            }
                            this._invertedIndex[key] = built;
                        }

                        for (const key of Object.keys(this.filters))
                            this._allUniqueValuesCache[key] =
                                this._computeAllUniqueValues(key);
                        for (const key of Object.keys(this.speedFilters))
                            this._speedRangeCache[key] =
                                this._computeSpeedRange(key);

                        // Restore from URL params (takes priority over localStorage)
                        const urlParams = new URLSearchParams(location.search);
                        if (urlParams.toString()) {
                            const presetLabel = urlParams.get("preset");
                            if (presetLabel) {
                                const preset = this.presets.find(
                                    (p) => p.label === presetLabel,
                                );
                                if (preset) this.applyPreset(preset);
                            } else {
                                for (const key of Object.keys(this.filters))
                                    this.filters[key] = [];
                            }
                            for (const [p, v] of urlParams) {
                                if (p === "preset") continue;
                                if (p.startsWith("f_")) {
                                    const key = p.slice(2);
                                    if (key in this.filters)
                                        try {
                                            this.filters[key].push(
                                                JSON.parse(v),
                                            );
                                        } catch {
                                            this.filters[key].push(v);
                                        }
                                } else if (p.startsWith("sf_")) {
                                    const rest = p.slice(3);
                                    const side = rest.endsWith("_min")
                                        ? "min"
                                        : rest.endsWith("_max")
                                          ? "max"
                                          : null;
                                    if (side) {
                                        const key = rest.slice(
                                            0,
                                            -(side.length + 1),
                                        );
                                        if (key in this.speedFilters)
                                            this.speedFilters[key][side] =
                                                parseFloat(v);
                                    }
                                } else if (p === "ari_min") {
                                    this.ariFilter.min = parseInt(v) || null;
                                } else if (p === "ari_max") {
                                    this.ariFilter.max = parseInt(v) || null;
                                } else if (p === "sort") {
                                    this.sortCol = v || null;
                                } else if (p === "dir") {
                                    this.sortDir = v;
                                } else if (p === "sp_min_mileage") {
                                    this.searchParams.minMileage = parseInt(v) || null;
                                } else if (p === "sp_max_mileage") {
                                    this.searchParams.maxMileage = parseInt(v) || null;
                                } else if (p === "sp_min_price") {
                                    this.searchParams.minPrice = parseInt(v) || null;
                                } else if (p === "sp_max_price") {
                                    this.searchParams.maxPrice = parseInt(v) || null;
                                } else if (p === "sp_max_distance") {
                                    this.searchParams.maxDistance = parseInt(v) || null;
                                } else if (p === "sp_zip") {
                                    this.searchParams.zipCode = v;
                                }
                            }
                        }

                        this.$watch("infoDismissed", (v) =>
                            localStorage.setItem(
                                "infoDismissed",
                                v ? "1" : "0",
                            ),
                        );
                        this.$watch("filters", (v) => {
                            localStorage.setItem("filters", JSON.stringify(v));
                            this._saveToUrl();
                        });
                        this.$watch("speedFilters", (v) => {
                            localStorage.setItem(
                                "speedFilters",
                                JSON.stringify(v),
                            );
                            this._saveToUrl();
                        });
                        this.$watch("ariFilter", (v) => {
                            localStorage.setItem(
                                "ariFilter",
                                JSON.stringify(v),
                            );
                            this._saveToUrl();
                        });
                        this.$watch("sortCol", (v) => {
                            localStorage.setItem("sortCol", JSON.stringify(v));
                            this._saveToUrl();
                        });
                        this.$watch("sortDir", (v) => {
                            localStorage.setItem("sortDir", v);
                            this._saveToUrl();
                        });
                        this.$watch("searchParams", () => this._saveToUrl(), { deep: true });
                        this.$watch("hiddenProviders", (v) => {
                            localStorage.setItem("hiddenProviders", JSON.stringify(v));
                            if (this.searchProviders.every((p) => v.includes(p.key)))
                                this.hiddenColumns = [...new Set([...this.hiddenColumns, "search"])];
                        });
                        this.$watch("hiddenColumns", (v) => {
                            if (!v.includes("search") && this.searchProviders.every((p) => this.hiddenProviders.includes(p.key)))
                                this.hiddenProviders = [];
                        });
                        if (!location.search) this._saveToUrl();
                    },

                    _saveToUrl() {
                        const params = new URLSearchParams();
                        const activePreset = this.presets.find((p) =>
                            this.isPresetActive(p),
                        );
                        const presetFilterKeys = new Set(
                            Object.keys(activePreset?.filters ?? {}),
                        );
                        const presetSpeedKeys = new Set(
                            Object.keys(activePreset?.speedFilters ?? {}),
                        );
                        if (activePreset)
                            params.set("preset", activePreset.label);
                        for (const [key, vals] of Object.entries(this.filters))
                            if (!presetFilterKeys.has(key))
                                for (const v of vals)
                                    params.append(
                                        "f_" + key,
                                        JSON.stringify(v),
                                    );
                        for (const [key, range] of Object.entries(
                            this.speedFilters,
                        )) {
                            if (presetSpeedKeys.has(key)) continue;
                            if (range.min !== null)
                                params.set("sf_" + key + "_min", range.min);
                            if (range.max !== null)
                                params.set("sf_" + key + "_max", range.max);
                        }
                        if (this.ariFilter.min !== null)
                            params.set("ari_min", this.ariFilter.min);
                        if (this.ariFilter.max !== null)
                            params.set("ari_max", this.ariFilter.max);
                        if (this.sortCol !== null)
                            params.set("sort", this.sortCol);
                        if (this.sortDir !== "asc")
                            params.set("dir", this.sortDir);
                        const sp = this.searchParams;
                        if (sp.minMileage) params.set("sp_min_mileage", sp.minMileage);
                        if (sp.maxMileage) params.set("sp_max_mileage", sp.maxMileage);
                        if (sp.minPrice) params.set("sp_min_price", sp.minPrice);
                        if (sp.maxPrice) params.set("sp_max_price", sp.maxPrice);
                        if (sp.maxDistance) params.set("sp_max_distance", sp.maxDistance);
                        if (sp.zipCode) params.set("sp_zip", sp.zipCode);
                        const qs = params.toString();
                        history.replaceState(
                            null,
                            "",
                            qs ? "?" + qs : location.pathname,
                        );
                    },

                    openAllSearchLinks(car) {
                        const urls = this.searchProviders
                            .filter(
                                (p) => !this.hiddenProviders.includes(p.key),
                            )
                            .map((p) => this.providerUrl(car, p.key))
                            .filter(Boolean);
                        for (const url of urls)
                            window.open(url, "_blank", "noopener");
                    },

                    openAllForProvider(key) {
                        const label =
                            this.searchProviders.find((p) => p.key === key)
                                ?.label ?? key;
                        const cars = this.filteredCars.filter((car) =>
                            this.providerUrl(car, key),
                        );
                        if (!cars.length) return;
                        if (
                            cars.length > 10 &&
                            !confirm(`Open ${cars.length} ${label} links?`)
                        )
                            return;
                        for (const car of cars)
                            window.open(
                                this.providerUrl(car, key),
                                "_blank",
                                "noopener",
                            );
                    },

                    autoTraderUrl(car) {
                        const slug = (s) =>
                            this.toAscii(s)
                                .toLowerCase()
                                .replace(/\s+/g, "-")
                                .replace(/[^a-z0-9-]/g, "");
                        const make = slug(car.make);
                        const key = `${car.make}|${car.model}`;
                        const variants =
                            this.modelMappings[key] ?? [car.model];
                        const codes = variants.map(
                            (v) =>
                                this.autotraderMappings[`${car.make}|${v}`] ?? v.replace(/\s+/g, ""),
                        );
                        const years = this.urlYears(car);
                        const p = this.searchParams;
                        const category = /hybrid/i.test(car.model) ? "hybrid/" : "";
                        const priceSegment = (p.minPrice || p.maxPrice)
                            ? `cars-between-${p.minPrice || 0}-and-${p.maxPrice || ""}/${category}`
                            : category;
                        const base = `https://www.autotrader.com/cars-for-sale/all-cars/${priceSegment}${make}`;
                        const yearParams = new URLSearchParams();
                        if (years.length) {
                            yearParams.set("startYear", years[0]);
                            yearParams.set("endYear", years[years.length - 1]);
                        }
                        if (p.maxMileage) yearParams.set("mileage", p.maxMileage);
                        if (p.maxDistance) yearParams.set("searchRadius", p.maxDistance);
                        yearParams.set("sortBy", "derivedpriceASC");
                        if (p.zipCode) yearParams.set("zip", p.zipCode);
                        if (codes.length > 1) {
                            const modelParams = [...codes]
                                .sort()
                                .map((c) => `modelCode=${encodeURIComponent(c)}`)
                                .join("&");
                            return `${base}?${modelParams}&${yearParams}`;
                        }
                        const modelSlug =
                            this.autotraderMappings[`${car.make}|${variants[0]}`] ??
                            slug(variants[0].replace(/\s*hybrid\s*/i, "").trim());
                        return `${base}/${modelSlug}?${yearParams}`;
                    },

                    carsComUrl(car) {
                        const makeSlug = (s) =>
                            this.toAscii(s)
                                .toLowerCase()
                                .replace(/\s+/g, "-")
                                .replace(/[^a-z0-9-]/g, "");
                        const modelSlug = (s) =>
                            this.toAscii(s)
                                .toLowerCase()
                                .replace(/\s+/g, "_")
                                .replace(/[^a-z0-9_]/g, "");
                        const years = this.urlYears(car);
                        const make = makeSlug(car.make);
                        const variants = this.modelMappings[
                            `${car.make}|${car.model}`
                        ] ?? [car.model];
                        const modelParams = variants
                            .map((m) => `models[]=${make}-${modelSlug(m)}`)
                            .join("&");
                        const p = this.searchParams;
                        let url = `https://www.cars.com/shopping/results/?stock_type=used&makes[]=${make}&${modelParams}&maximum_distance=${p.maxDistance || 9999}&sort=list_price`;
                        if (years.length)
                            url += `&year_min=${years[0]}&year_max=${years[years.length - 1]}`;
                        if (p.minPrice) url += `&list_price_min=${p.minPrice}`;
                        if (p.maxPrice) url += `&list_price_max=${p.maxPrice}`;
                        if (p.maxMileage) url += `&mileage_max=${p.maxMileage}`;
                        if (p.zipCode) url += `&zip=${encodeURIComponent(p.zipCode)}`;
                        return url;
                    },

                    carvanaUrl(car) {
                        const slug = (s) =>
                            this.toAscii(s)
                                .toLowerCase()
                                .replace(/\s+/g, "-")
                                .replace(/[^a-z0-9-]/g, "");
                        const years = this.urlYears(car);
                        const pkg = (car.package === "All" ? "" : car.package) || "";
                        const trimStr = pkg
                            .replace("Adaptive Cruise Control (ACC)", "")
                            .replace("Lane Assist", "")
                            .replace(/(\s*&\s*)+/g, " & ")
                            .replace(/^[\s&]+|[\s&]+$/g, "")
                            .replace(/\bPackage\b/g, "Pkg")
                            .trim();
                        const isHybrid = car.model.includes(" Hybrid");
                        const modelName = isHybrid
                            ? car.model.replace(" Hybrid", "")
                            : car.model;
                        const trims = trimStr ? trimStr.split(" or ") : [];
                        const makeEntry = isHybrid
                            ? { name: car.make, parentModels: [{ name: modelName, trims }], models: [] }
                            : { name: car.make, parentModels: [Object.assign({ name: modelName }, trims.length ? { trims } : {})] };
                        const filters = isHybrid
                            ? { fuelTypes: ["Hybrid"], makes: [makeEntry] }
                            : { makes: [makeEntry] };
                        if (years.length)
                            filters.year = {
                                max: years[years.length - 1],
                                min: years[0],
                            };
                        const cvnaFeatures = [];
                        if (/\(ACC\)/.test(pkg))
                            cvnaFeatures.push("Adaptive Cruise Control");
                        if (pkg.includes("Lane Assist"))
                            cvnaFeatures.push("Active Lane Keep Assistance");
                        if (cvnaFeatures.length)
                            filters.cvnaFeatures = cvnaFeatures;
                        const p = this.searchParams;
                        if (p.minPrice || p.maxPrice)
                            filters.price = Object.assign(
                                {},
                                p.minPrice ? { min: p.minPrice } : {},
                                p.maxPrice ? { max: p.maxPrice } : {},
                            );
                        if (p.minMileage || p.maxMileage)
                            filters.mileage = Object.assign(
                                {},
                                p.minMileage ? { min: p.minMileage } : {},
                                p.maxMileage ? { max: p.maxMileage } : {},
                            );
                        const json = JSON.stringify({
                            filters,
                            sortBy: "LowestPrice",
                        });
                        const cvnaid = btoa(
                            String.fromCharCode(
                                ...new TextEncoder().encode(json),
                            ),
                        ).replace(/=+$/, "");
                        return `https://www.carvana.com/cars/filters?cvnaid=${cvnaid}`;
                    },

                    carMaxUrl(car) {
                        const slug = (s) =>
                            this.toAscii(s)
                                .toLowerCase()
                                .replace(/\s+/g, "-")
                                .replace(/[^a-z0-9-]/g, "");
                        const make = slug(car.make);
                        const variants = this.modelMappings[`${car.make}|${car.model}`] ?? [car.model];
                        const modelSlugs = [...new Set(variants.map(slug))];
                        const rawPkg = (car.package === "All" ? "" : car.package) || "";
                        const cleanedPkg = rawPkg
                            .replace(/Adaptive Cruise Control \(ACC\)/g, "")
                            .replace(/Lane Assist/g, "")
                            .replace(/\bPackage\b/g, "")
                            .replace(/(\s*&\s*)+/g, " ")
                            .replace(/\s+/g, " ")
                            .trim();
                        const trimSlugs = cleanedPkg
                            ? [...new Set(cleanedPkg.split(" or ").map((t) => slug(t.trim())).filter(Boolean))]
                            : [];
                        if (/Adaptive Cruise Control \(ACC\)/.test(rawPkg)) trimSlugs.push("automated-cruise-control");
                        const years = this.urlYears(car);
                        const p = this.searchParams;
                        const parts = [];
                        if (p.minMileage || p.maxMileage)
                            parts.push(`mileage=${p.minMileage || 0}-${p.maxMileage || "nomileage"}`);
                        if (p.minPrice && p.maxPrice) parts.push(`price=${p.minPrice}-${p.maxPrice}`);
                        else if (p.minPrice) parts.push(`price=${p.minPrice}-nomax`);
                        else if (p.maxPrice) parts.push(`price=${p.maxPrice}`);
                        if (years.length) parts.push(years.length === 1 ? `year=${years[0]}` : `year=${years[0]}-${years[years.length - 1]}`);
                        const qs = parts.join("&");
                        const pathSlugs = [...modelSlugs, ...trimSlugs];
                        return `https://www.carmax.com/cars/${make}/${pathSlugs.join("/")}${qs ? `?${qs}` : ""}`;
                    },

                    carGurusUrl(car) {
                        const entry = this.carGurusCache[car._carGurusKey];
                        if (!entry?.paths?.length) return null;
                        const years = this.urlYears(car);
                        const params = new URLSearchParams({
                            sourceContext: "carSelectorAPI",
                            sortDirection: "ASC",
                            sortType: "PRICE",
                            startYear: years[0],
                            endYear: years[years.length - 1],
                            srpVariation: "DEFAULT_SEARCH",
                            makeModelTrimPaths: entry.paths.join(","),
                        });
                        const p = this.searchParams;
                        if (p.minMileage) params.set("minMileage", p.minMileage);
                        if (p.maxMileage) params.set("maxMileage", p.maxMileage);
                        if (p.minPrice) params.set("minPrice", p.minPrice);
                        if (p.maxPrice) params.set("maxPrice", p.maxPrice);
                        if (p.maxDistance) params.set("distance", p.maxDistance);
                        if (p.zipCode) params.set("zip", p.zipCode);
                        return `https://www.cargurus.com/search?${params}`;
                    },

                    providerUrl(car, key) {
                        if (key === "ebay") return this.ebayUrl(car);
                        if (key === "autotrader") return this.autoTraderUrl(car);
                        if (key === "cargurus") return this.carGurusUrl(car);
                        if (key === "carscom") return this.carsComUrl(car);
                        if (key === "carvana") return this.carvanaUrl(car);
                        if (key === "carmax") return this.carMaxUrl(car);
                        return null;
                    },

                    ebayUrl(car) {
                        const years = this.urlYears(car);
                        const yearStr =
                            years.length === 1
                                ? `${years[0]}`
                                : `(${years.join(",")})`;
                        const mappedModels = this.modelMappings[
                            `${car.make}|${car.model}`
                        ] ?? [car.model];
                        const modelName =
                            mappedModels.length === 1
                                ? mappedModels[0]
                                : `(${[car.model, ...mappedModels].join(",")})`;
                        const query = encodeURIComponent(
                            `${car.make} ${modelName.trim()} ${yearStr}`,
                        );
                        const p = this.searchParams;
                        let url = `https://www.ebay.com/sch/6001/i.html?_nkw=${query}&_sop=2`;
                        const ebayMileageBrackets = [50000, 75000, 100000, 125000, 150000, 175000, 200000];
                        const mileageBracket = p.maxMileage
                            ? ebayMileageBrackets.find((b) => b >= p.maxMileage) ?? null
                            : null;
                        if (p.minPrice || p.maxPrice || mileageBracket) url += `&rt=nc`;
                        if (p.minPrice) url += `&_udlo=${p.minPrice}`;
                        if (p.maxPrice) url += `&_udhi=${p.maxPrice}`;
                        if (mileageBracket) {
                            const label = `Less than ${mileageBracket.toLocaleString("en-US")} miles`;
                            url += `&${encodeURIComponent(encodeURIComponent("Vehicle Mileage"))}=${encodeURIComponent(encodeURIComponent(label))}&_dcat=6001`;
                        }
                        if (p.zipCode) url += `&_stpos=${encodeURIComponent(p.zipCode)}&_fspt=1`;
                        if (p.maxDistance) url += `&_sadis=${p.maxDistance}`;
                        return url;
                    },

                    supportTypeClass(supportType) {
                        return (
                            {
                                Upstream: "badge-g",
                                "Under review": "badge-y",
                                Community: "badge-b",
                                Custom: "badge-p",
                                "Dashcam mode": "badge-o",
                                "Not compatible": "badge-r",
                            }[supportType] ?? "badge-d"
                        );
                    },

                    forkClass(fork) {
                        return (
                            { openpilot: "badge-fg", sunnypilot: "badge-fb" }[
                                fork
                            ] ?? "badge-d"
                        );
                    },
                };
            }
        </script>
        <!-- prettier-ignore -->
        <script>{{ alpine_js }}</script>
    </body>
</html>
